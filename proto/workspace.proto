syntax = "proto3";

package helmr.workspace.v0;

option go_package = "github.com/helmrdotdev/helmr/internal/proto/workspace/v0;workspacev0";

message WorkspaceOperationEnvelope {
  string operation_id = 1;
  string materialization_id = 2;
  string workspace_id = 3;
  string channel_token = 4;
  uint64 fencing_generation = 5;
  string instance_lease_id = 6;
  string write_lease_id = 7;
  string fencing_token = 8;
  int64 operation_expires_at_unix_nano = 9;
  string request_fingerprint = 10;
}

message WorkspaceArtifact {
  string digest = 1;
  string media_type = 2;
  string encoding = 3;
  uint64 size_bytes = 4;
  uint32 entry_count = 5;
}

message MaterializeWorkspaceRequest {
  WorkspaceOperationEnvelope envelope = 1;
  string mount_path = 2;
  string base_version_id = 3;
  WorkspaceArtifact base_artifact = 4;
  WorkspaceArtifact sandbox_artifact = 5;
}

message MaterializeWorkspaceResponse {
  string state = 1;
  string guestd_channel_token_hash = 2;
}

message HeartbeatWorkspaceRequest {
  WorkspaceOperationEnvelope envelope = 1;
  string state = 2;
  uint64 dirty_generation = 3;
}

message HeartbeatWorkspaceResponse {
  string state = 1;
  bool stop_requested = 2;
}

message CaptureWorkspaceRequest {
  WorkspaceOperationEnvelope envelope = 1;
  string base_version_id = 2;
  uint64 dirty_generation = 3;
}

message CaptureWorkspaceResponse {
  WorkspaceArtifact artifact = 1;
}

message StopWorkspaceRequest {
  WorkspaceOperationEnvelope envelope = 1;
  bool capture_before_stop = 2;
  bool finalize_stop = 3;
}

message StopWorkspaceResponse {
  string state = 1;
  WorkspaceArtifact captured_artifact = 2;
  string error_json = 3;
}

message WorkspaceOperationRequest {
  WorkspaceOperationEnvelope envelope = 1;
  string operation_kind = 2;
  string request_json = 3;
}

message WorkspaceOperationResult {
  string result_json = 1;
  string error_json = 2;
}

message WorkspaceExecStarted {
  string exec_id = 1;
  string process_id = 2;
}

message WorkspaceExecOutputChunk {
  string exec_id = 1;
  bytes data = 2;
}

message WorkspaceExecExited {
  string exec_id = 1;
  int32 exit_code = 2;
  string signal = 3;
  string error_json = 4;
}

message WorkspaceExecError {
  string exec_id = 1;
  string error_json = 2;
}

message WorkspacePtyOpened {
  string pty_id = 1;
  string process_id = 2;
  uint32 cols = 3;
  uint32 rows = 4;
}

message WorkspacePtyOutputChunk {
  string pty_id = 1;
  bytes data = 2;
}

message WorkspacePtyResizeApplied {
  string pty_id = 1;
  uint32 cols = 2;
  uint32 rows = 3;
}

message WorkspacePtyClosed {
  string pty_id = 1;
  string reason = 2;
  string error_json = 3;
}

message WorkspacePtyError {
  string pty_id = 1;
  string error_json = 2;
}

message WorkspaceOperationEvent {
  WorkspaceOperationEnvelope envelope = 1;
  oneof event {
    WorkspaceExecStarted exec_started = 2;
    WorkspaceExecOutputChunk exec_stdout_chunk = 3;
    WorkspaceExecOutputChunk exec_stderr_chunk = 4;
    WorkspaceExecExited exec_exited = 5;
    WorkspaceExecError exec_error = 6;
    WorkspacePtyOpened pty_opened = 7;
    WorkspacePtyOutputChunk pty_output_chunk = 8;
    WorkspacePtyResizeApplied pty_resize_applied = 9;
    WorkspacePtyClosed pty_closed = 10;
    WorkspacePtyError pty_error = 11;
  }
}

message WorkspaceStreamAck {
  WorkspaceOperationEnvelope envelope = 1;
  string resource_kind = 2;
  string resource_id = 3;
  string stream = 4;
  uint64 durable_offset = 5;
}

message WorkspaceInputChunk {
  WorkspaceOperationEnvelope envelope = 1;
  string resource_kind = 2;
  string resource_id = 3;
  string stream = 4;
  uint64 offset_start = 5;
  bytes data = 6;
}

message WorkspaceInputClose {
  WorkspaceOperationEnvelope envelope = 1;
  string resource_kind = 2;
  string resource_id = 3;
  string stream = 4;
  uint64 offset = 5;
}

message WorkspaceInputFrame {
  oneof frame {
    WorkspaceInputChunk chunk = 1;
    WorkspaceInputClose close = 2;
  }
}
