syntax = "proto3";

package helmr.run.v0;

option go_package = "github.com/helmrdotdev/helmr/internal/proto/run/v0;runv0";

message RunTaskWorkspace {
  string path = 1;
  string project_path = 2;
  WorkspaceArtifact artifact = 3;
  bool writable = 5;
}

message WorkspaceArtifact {
  string digest = 1;
  string media_type = 2;
  string encoding = 3;
  uint64 size_bytes = 4;
  uint32 entry_count = 5;
}

message RunTaskRequest {
  string task_id = 1;
  string module_path = 2;
  string cwd = 3;
  repeated SecretInject secrets = 4;
  string run_id = 5;
  string payload_json = 6;
  RunTaskWorkspace workspace = 7;
  TraceContext trace = 8;
  string attempt_id = 9;
  uint32 attempt_number = 10;
  string run_lease_id = 11;
  uint64 snapshot_version = 12;
  string session_id = 13;
  string retry_reason = 14;
}

message TraceContext {
  string trace_id = 1;
  string span_id = 2;
  string traceparent = 3;
}

message SecretInject {
  string name = 1;
  Placement placement = 2;
  bytes value_bytes = 3;
}

message Placement {
  oneof kind {
    EnvPlacement env = 1;
    FilePlacement file = 2;
    DirPlacement dir = 3;
  }
}

message EnvPlacement {
  string name = 1;
}

message FilePlacement {
  string path = 1;
  // Optional octal permission bits for the materialized secret file.
  // Accepts values such as "0400", "600", and "0o600"; special bits are rejected.
  optional string mode = 2;
  // Optional runtime owner as an OCI-style user or user:group spec.
  // Defaults to the resolved runtime user.
  optional string owner = 3;
}

message DirPlacement {
  string path = 1;
  // Optional octal permission bits for the materialized secret directory.
  // Accepts values such as "0700", "700", and "0o700"; special bits are rejected.
  optional string mode = 2;
  // Optional runtime owner as an OCI-style user or user:group spec.
  // Defaults to the resolved runtime user.
  optional string owner = 3;
}

message RunEvent {
  oneof event {
    bytes stdout_chunk = 1;
    bytes stderr_chunk = 2;
    string log_entry = 3;
    TaskResult task_result = 4;
    RunWaitRequested run_wait_requested = 5;
    MetadataUpdated metadata_updated = 7;
    TokenCreateRequested token_create_requested = 8;
    OutputStreamAppended output_stream_appended = 9;
    ActiveStreamReadRequested active_stream_read_requested = 10;
    ResumeConsumed resume_consumed = 6;
  }
}

message TaskResult {
  int32 exit_code = 1;
  optional string error_message = 2;
  optional string output_json = 3;
  optional TaskError error = 4;
}

message TaskError {
  string type = 1;
  string code = 2;
  string message = 3;
  bool retryable = 4;
  string details_json = 5;
}

message RunWaitRequested {
  reserved 7, 8;

  string correlation_id = 1;
  string kind = 2;
  string params_json = 3;
  optional string metadata_json = 4;
  optional uint32 timeout = 5;
  repeated string tags = 6;
  optional uint32 idle_timeout = 9;
}

message TokenCreateRequested {
  optional string timeout_at = 1;
  optional uint32 timeout_in_seconds = 2;
  repeated string tags = 4;
  optional string metadata_json = 5;
}

message TokenCreateResult {
  string id = 1;
  string callback_url = 2;
  optional string public_access_token = 3;
  optional string timeout_at = 4;
  optional string status = 5;
  repeated string tags = 6;
  optional string metadata_json = 7;
  optional string error_message = 9;
}

message ActiveStreamReadRequested {
  string correlation_id = 1;
  string stream = 2;
  int64 after_sequence = 3;
  optional string record_correlation_id = 4;
  optional uint32 timeout = 5;
  bool block = 6;
}

message StreamRecord {
  string id = 1;
  string stream_id = 2;
  int64 sequence = 3;
  string data_json = 4;
  optional string correlation_id = 5;
  string content_type = 6;
  string created_at = 7;
}

message ActiveStreamReadResult {
  string correlation_id = 1;
  optional StreamRecord record = 2;
  bool timed_out = 3;
  optional string error_message = 4;
}

message CheckpointPauseRequest {
  string run_wait_id = 1;
  string checkpoint_id = 2;
  bool capture_workspace = 3;
}

message CheckpointPauseReady {
  string run_wait_id = 1;
  string checkpoint_id = 2;
}

message ResumeAttach {
  string checkpoint_id = 1;
  string run_wait_id = 2;
  string run_lease_id = 3;
}

message ResumeDecision {
  string run_wait_id = 1;
  string kind = 2;
  string data_json = 3;
  bool require_consumed_ack = 4;
}

message ResumeAck {
  string run_wait_id = 1;
}

message ResumeConsumed {
  string run_wait_id = 1;
}

message OutputStreamAppended {
  string stream = 1;
  string payload_json = 2;
  optional string content_type = 3;
}

message MetadataUpdated {
  string operation = 1;
  optional string key = 2;
  optional string value_json = 3;
  optional string patch_json = 4;
  optional double amount = 5;
}
