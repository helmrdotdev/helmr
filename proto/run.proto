syntax = "proto3";

package helmr.run.v0;

option go_package = "github.com/helmrdotdev/helmr/internal/proto/run/v0;runv0";

message GitHubPullRequestMetadata {
  int32 number = 1;
  string base_ref = 2;
  string base_sha = 3;
  string head_ref = 4;
  string head_sha = 5;
}

message RunTaskGitHubSource {
  string repository = 1;
  string requested_ref = 2;
  string resolved_sha = 3;
  optional string ref_kind = 4;
  optional string ref_name = 5;
  optional string full_ref = 6;
  optional string subpath = 7;
  optional string default_branch = 8;
  optional GitHubPullRequestMetadata pull_request = 9;
}

message RunTaskSource {
  oneof kind {
    RunTaskGitHubSource github = 1;
  }
}

message RunTaskWorkspace {
  string path = 1;
  string project_path = 2;
  WorkspaceArtifact artifact = 3;
  string volume_kind = 4;
  bool writable = 5;
}

message WorkspaceArtifact {
  string digest = 1;
  string media_type = 2;
  string encoding = 3;
}

message RunTaskRequest {
  string task_id = 1;
  string module_path = 2;
  string cwd = 3;
  repeated SecretInject secrets = 4;
  string run_id = 5;
  string payload_json = 6;
  RunTaskSource source = 8;
  RunTaskWorkspace workspace = 9;
}

message SecretInject {
  string name = 1;
  Placement placement = 2;
  bytes value_bytes = 3;
}

message Placement {
  oneof kind {
    EnvPlacement env = 1;
    FilePlacement file = 2;
    DirPlacement dir = 3;
  }
}

message EnvPlacement {
  string name = 1;
}

message FilePlacement {
  string path = 1;
  // Optional octal permission bits for the materialized secret file.
  // Accepts values such as "0400", "600", and "0o600"; special bits are rejected.
  optional string mode = 2;
  // Optional runtime owner as an OCI-style user or user:group spec.
  // Defaults to the resolved runtime user.
  optional string owner = 3;
}

message DirPlacement {
  string path = 1;
  // Optional octal permission bits for the materialized secret directory.
  // Accepts values such as "0700", "700", and "0o700"; special bits are rejected.
  optional string mode = 2;
  // Optional runtime owner as an OCI-style user or user:group spec.
  // Defaults to the resolved runtime user.
  optional string owner = 3;
}

message RunEvent {
  oneof event {
    bytes stdout_chunk = 1;
    bytes stderr_chunk = 2;
    string log_entry = 3;
    TaskComplete task_complete = 4;
    WaitRequested wait_requested = 6;
    EmitEvent emit_event = 8;
    TaskOutcome task_outcome = 10;
  }
}

message TaskComplete {
  int32 exit_code = 1;
  optional string error_message = 2;
  optional string output_json = 3;
}

message TaskOutcome {
  int32 exit_code = 1;
  optional string error_message = 2;
  optional string output_json = 3;
}

message WaitRequested {
  string correlation_id = 1;
  oneof kind {
    ApprovalWait approval = 2;
    MessageWait message = 3;
  }
}

message ApprovalWait {
  string message = 1;
  optional uint32 timeout = 2;
  optional string policy = 3;
}

message MessageWait {
  optional string prompt = 1;
  optional uint32 timeout = 2;
  optional string policy = 3;
}

message SuspendForCheckpoint {
  string waitpoint_id = 1;
  string checkpoint_id = 2;
}

message PauseReady {
  string waitpoint_id = 1;
  string checkpoint_id = 2;
}

message ResumeAttach {
  string checkpoint_id = 1;
  string waitpoint_id = 2;
  string session_id = 3;
}

message ResumeDecision {
  string waitpoint_id = 1;
  string kind = 2;
  string resolution_payload_json = 3;
  bool timed_out = 4;
}

message ResumeAck {
  string waitpoint_id = 1;
}

message EmitEvent {
  string type = 1;
  string content_json = 2;
}
