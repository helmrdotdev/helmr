<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=DotGothic16&amp;family=Geist+Mono:wght@400;500&amp;display=swap");
    @import url("https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600&amp;display=swap");
    text { dominant-baseline: text-before-edge; }
    .sans { font-family: "General Sans", "Helvetica Neue", Arial, sans-serif; }
    .dot { font-family: "DotGothic16", "Geist Mono", monospace; }
    .mono { font-family: "Geist Mono", "Courier New", monospace; }
    .chip { font-size: 19px; fill: #1f1f24; }
  </style>
  <rect width="1200" height="630" fill="#faf8f4"/>
  <rect x="48.5" y="48.5" width="1103" height="533" fill="none" stroke="#5079e4" stroke-opacity="0.38" stroke-dasharray="1 3"/>

  <g transform="translate(112 106.5) scale(2.75)" shape-rendering="crispEdges">
    <rect width="16" height="16" fill="#e3f0ff"/>
    <path fill="#1f1f24" transform="translate(3 3)" d="M4 0h2v1H4zM2 1h6v1H2zM0 2h10v1H0zM2 3h6v1H2zM4 4h2v1H4zM0 6h2v1H0zM8 6h2v1H8zM2 7h2v1H2zM6 7h2v1H6zM4 8h2v1H4z"/>
  </g>
  <text class="dot" x="170" y="104" font-size="34" fill="#1f1f24">Helmr</text>

  <text class="sans" x="112" y="229" font-size="88" font-weight="500" letter-spacing="-1.58" fill="#1f1f24">The durable runtime</text>
  <rect x="102" y="332.03" width="583.03" height="90.28" fill="#e3f0ff"/>
  <text class="dot" x="112" y="325" font-size="83.6" fill="#1f1f24">for AI agents.</text>

  <text class="mono" x="112" y="466.31" font-size="25" fill="#585862">Each run is a microVM, checkpointed whole — in plain TypeScript.</text>

  <rect x="112" y="498.31" width="85" height="39" fill="#fff0bd"/>
  <text class="mono chip" x="154.5" y="505.31" text-anchor="middle">pause</text>
  <rect x="209" y="498.31" width="119.2" height="39" fill="#e3f0ff"/>
  <text class="mono chip" x="268.6" y="505.31" text-anchor="middle">schedule</text>
  <rect x="340.2" y="498.31" width="107.81" height="39" fill="#f3dded"/>
  <text class="mono chip" x="394.11" y="505.31" text-anchor="middle">trigger</text>
  <rect x="460.02" y="498.31" width="96.41" height="39" fill="#e4efdc"/>
  <text class="mono chip" x="508.22" y="505.31" text-anchor="middle">replay</text>
  <text class="mono" x="1088" y="504.31" text-anchor="end" font-size="21" fill="#8b8a91">helmr.dev</text>
</svg>
