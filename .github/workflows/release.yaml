name: release

on:
  push:
    tags:
      - "v*"
      - "sdk/typescript/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub Release tag to create or update
        required: true
        default: v0.1.0
      worker_amis_json:
        description: Optional JSON object mapping AWS regions to worker AMI IDs. Leave {} to build official worker AMIs.
        required: false
        default: "{}"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli:
    name: cli
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Validate release tag
        run: |
          if ! printf '%s' "$RELEASE_TAG" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+$'; then
            echo "release tag must match vX.Y.Z" >&2
            exit 1
          fi
          if ! git check-ref-format --allow-onelevel "$RELEASE_TAG"; then
            echo "release tag must be a valid git ref name" >&2
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && '0' || '1' }}
          persist-credentials: false

      - name: Use existing release tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          if git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            git checkout --detach "refs/tags/$RELEASE_TAG"
          fi

      - uses: ./.github/actions/setup-nix

      - name: Build CLI archives
        run: |
          nix develop --command bash -ceu '
            bun install --frozen-lockfile --ignore-scripts
            mkdir -p dist/cli
            bun build runtime/typescript/src/main.ts --target bun --format esm --outfile dist/cli/main.js
            bun build sdk/typescript/src/index.ts --target bun --format esm --outfile dist/cli/sdk.js
            for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
              os="${target%/*}"
              arch="${target#*/}"
              out_dir="dist/cli/helmr-${os}-${arch}"
              mkdir -p "$out_dir/adapter"
              CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build \
                -trimpath \
                -ldflags="-s -w -X github.com/helmrdotdev/helmr/internal/version.Version=${RELEASE_TAG}" \
                -o "$out_dir/helmr" \
                ./cmd/helmr
              cp dist/cli/main.js "$out_dir/adapter/main.js"
              cp dist/cli/sdk.js "$out_dir/adapter/sdk.js"
              tar -C "$out_dir" -czf "dist/helmr-${os}-${arch}.tar.gz" helmr adapter
            done
            cd dist
            sha256sum helmr-*.tar.gz > checksums.txt
          '

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cli-release-assets
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/helmr-linux-amd64.tar.gz
            dist/helmr-linux-arm64.tar.gz
            dist/helmr-darwin-amd64.tar.gz
            dist/helmr-darwin-arm64.tar.gz
            dist/checksums.txt

  control-image:
    name: control image
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      CONTROL_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/helmr-control
    steps:
      - name: Validate release tag
        run: |
          if ! printf '%s' "$RELEASE_TAG" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+$'; then
            echo "release tag must match vX.Y.Z" >&2
            exit 1
          fi
          if ! git check-ref-format --allow-onelevel "$RELEASE_TAG"; then
            echo "release tag must be a valid git ref name" >&2
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && '0' || '1' }}
          persist-credentials: false

      - name: Use existing release tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          if git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            git checkout --detach "refs/tags/$RELEASE_TAG"
          fi

      - uses: ./.github/actions/setup-nix

      - name: Build control image
        env:
          IMAGE_URI: ${{ env.CONTROL_IMAGE_REPOSITORY }}:${{ env.RELEASE_TAG }}
          HELMR_BUILD_VERSION: ${{ env.RELEASE_TAG }}
        run: |
          nix develop .#images --command bash -ceu './scripts/build-control-image.sh "$IMAGE_URI"'
          mkdir -p dist
          docker save "$IMAGE_URI" -o dist/control-image.tar

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: control-image
          if-no-files-found: error
          retention-days: 7
          path: dist/control-image.tar

  typescript-sdk-packages:
    name: typescript sdk packages
    if: startsWith(github.ref, 'refs/tags/sdk/typescript/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      platform_tag: ${{ steps.version.outputs.platform_tag }}
      sdk_version: ${{ steps.version.outputs.sdk_version }}
    env:
      SDK_RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Validate TypeScript SDK release tag
        id: version
        run: |
          if ! printf '%s' "$SDK_RELEASE_TAG" | grep -Eq '^sdk/typescript/v[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z-]+([.][0-9A-Za-z-]+)*)?$'; then
            echo "TypeScript SDK release tag must match sdk/typescript/vX.Y.Z or sdk/typescript/vX.Y.Z-prerelease" >&2
            exit 1
          fi
          if ! git check-ref-format --allow-onelevel "$SDK_RELEASE_TAG"; then
            echo "TypeScript SDK release tag must be a valid git ref name" >&2
            exit 1
          fi
          sdk_version="${SDK_RELEASE_TAG#sdk/typescript/v}"
          printf 'sdk_version=%s\n' "$sdk_version" >> "$GITHUB_OUTPUT"
          printf 'platform_tag=v%s\n' "$sdk_version" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - uses: ./.github/actions/setup-nix

      - name: Build TypeScript SDK npm packages
        run: |
          nix develop --command bash -ceu '
            bun install --frozen-lockfile --ignore-scripts
            PACKAGE_VERSION="${{ steps.version.outputs.sdk_version }}" bun run build:npm
            bun run pack:npm dist/npm-tarballs
          '

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: typescript-sdk-npm-packages
          if-no-files-found: error
          retention-days: 7
          path: dist/npm-tarballs/*.tgz

  typescript-sdk-npm-publish:
    name: typescript sdk npm publish
    if: startsWith(github.ref, 'refs/tags/sdk/typescript/v')
    needs:
      - typescript-sdk-packages
    runs-on: ubuntu-24.04
    environment: release-production
    permissions:
      contents: read
      id-token: write # Needed for npm Trusted Publishing. security-check: allow-id-token
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: typescript-sdk-npm-packages
          path: dist/npm-tarballs

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Publish npm packages
        env:
          SDK_VERSION: ${{ needs.typescript-sdk-packages.outputs.sdk_version }}
        run: |
          npm_version="$(npm --version)"
          if [ "$(printf '%s\n' 11.5.1 "$npm_version" | sort -V | head -n 1)" != 11.5.1 ]; then
            echo "npm CLI 11.5.1 or newer is required for Trusted Publishing: $npm_version" >&2
            exit 1
          fi
          publish_package() {
            package_name="$1"
            tarball="$2"
            if npm view "${package_name}@${SDK_VERSION}" version --json --prefer-online >/dev/null 2>&1; then
              echo "${package_name}@${SDK_VERSION} is already published; skipping"
              return
            fi
            npm publish "$tarball" --access public --provenance
          }
          publish_package @helmr/proto dist/npm-tarballs/helmr-proto-*.tgz
          publish_package @helmr/sdk dist/npm-tarballs/helmr-sdk-*.tgz

  typescript-sdk-release:
    name: typescript sdk release
    if: startsWith(github.ref, 'refs/tags/sdk/typescript/v')
    needs:
      - typescript-sdk-packages
      - typescript-sdk-npm-publish
    runs-on: ubuntu-24.04
    environment: release-production
    permissions:
      contents: write # Needed to create or update GitHub Release assets.
    env:
      PLATFORM_TAG: ${{ needs.typescript-sdk-packages.outputs.platform_tag }}
      SDK_RELEASE_TAG: ${{ github.ref_name }}
      SDK_VERSION: ${{ needs.typescript-sdk-packages.outputs.sdk_version }}
    steps:
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ env.SDK_RELEASE_TAG }}
          name: TypeScript SDK ${{ env.SDK_VERSION }}
          body: |
            TypeScript SDK release for Helmr ${{ env.PLATFORM_TAG }}.

            Packages:
            - https://www.npmjs.com/package/@helmr/proto/v/${{ env.SDK_VERSION }}
            - https://www.npmjs.com/package/@helmr/sdk/v/${{ env.SDK_VERSION }}

  worker-ami:
    name: worker AMI
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    environment: release-production
    permissions:
      contents: read
      id-token: write # Needed to assume the AWS release role through GitHub OIDC. security-check: allow-id-token
    outputs:
      worker_amis_json: ${{ steps.provided_worker_amis.outputs.worker_amis_json || steps.build_worker_amis.outputs.worker_amis_json }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      WORKER_AMIS_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.worker_amis_json || '{}' }}
      WORKER_AMI_REGIONS: ${{ vars.RELEASE_WORKER_AMI_REGIONS || 'us-east-1,us-west-2,ap-northeast-1' }}
      AWS_REGION: ${{ vars.RELEASE_AWS_REGION || 'us-east-1' }}
      STATE_REGION: ${{ vars.RELEASE_AWS_STATE_REGION || vars.RELEASE_AWS_REGION || 'us-east-1' }}
      STATE_BUCKET: ${{ vars.RELEASE_AWS_STATE_BUCKET }}
      STATE_KEY: ${{ vars.RELEASE_AWS_STATE_KEY || 'helmr/stacks/release-worker-image/terraform.tfstate' }}
      WORKER_IMAGE_NAME: ${{ vars.RELEASE_WORKER_IMAGE_NAME || 'helmr-release-image' }}
      IMAGE_WAIT_INTERVAL_SECONDS: ${{ vars.RELEASE_WORKER_IMAGE_WAIT_INTERVAL_SECONDS || '60' }}
      IMAGE_WAIT_TIMEOUT_SECONDS: ${{ vars.RELEASE_WORKER_IMAGE_WAIT_TIMEOUT_SECONDS || '14400' }}
      TOFU_APPLY_ARGS: -auto-approve
    steps:
      - name: Validate release tag
        run: |
          if ! printf '%s' "$RELEASE_TAG" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+$'; then
            echo "worker AMI releases require a vX.Y.Z release tag" >&2
            exit 1
          fi
          if ! git check-ref-format --allow-onelevel "$RELEASE_TAG"; then
            echo "release tag must be a valid git ref name" >&2
            exit 1
          fi

      - name: Use provided worker AMIs
        id: provided_worker_amis
        if: env.WORKER_AMIS_INPUT != '' && env.WORKER_AMIS_INPUT != '{}'
        run: |
          jq -e --arg regions "$WORKER_AMI_REGIONS" '
            . as $worker_amis
            |
            ($regions | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))) as $required_regions
            | type == "object"
            and all($required_regions[]; . as $region | ($worker_amis | has($region)) and ($worker_amis[$region] | type == "string" and test("^ami-[0-9a-f]{8,}$")))
            and all(keys[]; test("^[a-z]{2}-[a-z-]+-[0-9]+$"))
            and all(.[]; type == "string" and test("^ami-[0-9a-f]{8,}$"))
          ' <<<"$WORKER_AMIS_INPUT" >/dev/null
          worker_amis_json="$(jq -c . <<<"$WORKER_AMIS_INPUT")"
          printf 'worker_amis_json=%s\n' "$worker_amis_json" >> "$GITHUB_OUTPUT"

      - name: Check AWS release settings
        if: steps.provided_worker_amis.outcome == 'skipped'
        env:
          RELEASE_AWS_ROLE_ARN: ${{ vars.RELEASE_AWS_ROLE_ARN }}
        run: |
          [ -n "$RELEASE_AWS_ROLE_ARN" ] || { echo "RELEASE_AWS_ROLE_ARN environment variable is required" >&2; exit 1; }
          [ -n "$STATE_BUCKET" ] || { echo "RELEASE_AWS_STATE_BUCKET environment variable is required" >&2; exit 1; }

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        if: steps.provided_worker_amis.outcome == 'skipped'
        with:
          ref: ${{ github.ref }}
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && '0' || '1' }}
          persist-credentials: false

      - name: Resolve worker AMI source ref
        id: worker_source_ref
        if: steps.provided_worker_amis.outcome == 'skipped'
        run: |
          if git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            source_ref="$RELEASE_TAG"
          else
            source_ref="$GITHUB_SHA"
          fi
          printf 'source_ref=%s\n' "$source_ref" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885
        if: steps.provided_worker_amis.outcome == 'skipped'
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.RELEASE_AWS_ROLE_ARN }}
          role-duration-seconds: 14400
          mask-aws-account-id: true

      - uses: ./.github/actions/setup-nix
        if: steps.provided_worker_amis.outcome == 'skipped'

      - name: Build worker AMIs
        id: build_worker_amis
        if: steps.provided_worker_amis.outcome == 'skipped'
        env:
          WORKER_IMAGE_VERSION: ${{ env.RELEASE_TAG }}
          WORKER_IMAGE_SOURCE_REF: ${{ steps.worker_source_ref.outputs.source_ref }}
          WORKER_IMAGE_DISTRIBUTION_REGIONS: ${{ env.WORKER_AMI_REGIONS }}
          WORKER_IMAGE_AMI_PUBLIC: "true"
          WORKER_IMAGE_ROOT_VOLUME_ENCRYPTED: "false"
        run: |
          export WORKER_IMAGE_VERSION="${WORKER_IMAGE_VERSION#v}"
          nix develop .#infra --command bash -seu <<'EOF'
            scripts/aws-dev-smoke.sh check
            scripts/aws-dev-smoke.sh worker-image-source-check
            scripts/aws-dev-smoke.sh worker-image-init
            scripts/aws-dev-smoke.sh worker-image-apply
            scripts/aws-dev-smoke.sh worker-image-start
            scripts/aws-dev-smoke.sh worker-image-wait
            worker_amis_json="$(scripts/aws-dev-smoke.sh worker-image-amis)"
            printf "worker_amis_json=%s\n" "$worker_amis_json" >> "$GITHUB_OUTPUT"
          EOF

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: steps.provided_worker_amis.outcome == 'skipped'
        with:
          name: worker-ami-release-assets
          if-no-files-found: error
          retention-days: 30
          path: |
            .helmr-aws-dev-smoke/worker-image-build-version-arn
            .helmr-aws-dev-smoke/worker-ami-id
            .helmr-aws-dev-smoke/worker-ami-ids.json

  publish:
    name: publish
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs:
      - cli
      - control-image
      - worker-ami
    runs-on: ubuntu-24.04
    environment: release-production
    permissions:
      contents: write # Needed to create or update GitHub Release assets.
      packages: write # Needed to push the official control image to GHCR.
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      CONTROL_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/helmr-control
      IMAGE_URI: ghcr.io/${{ github.repository_owner }}/helmr-control:${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      WORKER_AMIS_JSON: ${{ needs.worker-ami.outputs.worker_amis_json }}
      WORKER_AMI_REGIONS: ${{ vars.RELEASE_WORKER_AMI_REGIONS || 'us-east-1,us-west-2,ap-northeast-1' }}
    steps:
      - name: Validate release tag
        run: |
          if ! printf '%s' "$RELEASE_TAG" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+$'; then
            echo "release tag must match vX.Y.Z" >&2
            exit 1
          fi
          if ! git check-ref-format --allow-onelevel "$RELEASE_TAG"; then
            echo "release tag must be a valid git ref name" >&2
            exit 1
          fi

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: cli-release-assets
          path: dist

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: control-image
          path: dist/control-image

      - name: Push control image
        id: push
        env:
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          docker load -i dist/control-image/control-image.tar
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "$GHCR_ACTOR" --password-stdin
          push_output="$(docker push "$IMAGE_URI")"
          printf '%s\n' "$push_output"
          digest="$(printf '%s\n' "$push_output" | awk '/digest:/ { print $3 }' | tail -n 1)"
          if [ -z "$digest" ]; then
            echo "failed to parse pushed image digest" >&2
            exit 1
          fi
          printf 'control_image=%s@%s\n' "${CONTROL_IMAGE_REPOSITORY}" "$digest" >> "$GITHUB_OUTPUT"

      - name: Write AWS release manifest
        env:
          CONTROL_IMAGE: ${{ steps.push.outputs.control_image }}
        run: |
          jq -e '
            . as $worker_amis
            |
            ($ENV.WORKER_AMI_REGIONS | split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))) as $required_regions
            | type == "object"
            and all($required_regions[]; . as $region | ($worker_amis | has($region)) and ($worker_amis[$region] | type == "string" and test("^ami-[0-9a-f]{8,}$")))
            and all(keys[]; test("^[a-z]{2}-[a-z-]+-[0-9]+$"))
            and all(.[]; type == "string" and test("^ami-[0-9a-f]{8,}$"))
          ' >/dev/null <<<"$WORKER_AMIS_JSON"

          jq -n \
            --arg control_image "$CONTROL_IMAGE" \
            --argjson worker_amis "$WORKER_AMIS_JSON" \
            '{
              control_image: $control_image,
              worker_amis: $worker_amis
            }' > dist/aws-artifacts.json

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/helmr-linux-amd64.tar.gz
            dist/helmr-linux-arm64.tar.gz
            dist/helmr-darwin-amd64.tar.gz
            dist/helmr-darwin-arm64.tar.gz
            dist/checksums.txt
            dist/aws-artifacts.json

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        if: github.event_name != 'workflow_dispatch'
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/helmr-linux-amd64.tar.gz
            dist/helmr-linux-arm64.tar.gz
            dist/helmr-darwin-amd64.tar.gz
            dist/helmr-darwin-arm64.tar.gz
            dist/checksums.txt
            dist/aws-artifacts.json
