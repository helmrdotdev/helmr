name: release

on:
  push:
    tags:
      - "v*"
      - "sdk/typescript/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub Release tag to create or update
        required: true
        default: v0.1.0
      worker_amis_json:
        description: JSON object mapping AWS regions to worker AMI IDs for aws-artifacts.json
        required: false
        default: "{}"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cli:
    name: cli
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Validate release tag
        run: |
          if ! printf '%s' "$RELEASE_TAG" | grep -Eq '^v[A-Za-z0-9][A-Za-z0-9._-]{0,127}$'; then
            echo "release tag must start with v and contain only ASCII letters, numbers, dot, underscore, or hyphen" >&2
            exit 1
          fi
          if ! git check-ref-format --allow-onelevel "$RELEASE_TAG"; then
            echo "release tag must be a valid git ref name" >&2
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && '0' || '1' }}
          persist-credentials: false

      - name: Use existing release tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          if git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            git checkout --detach "refs/tags/$RELEASE_TAG"
          fi

      - uses: ./.github/actions/setup-nix

      - name: Build CLI archives
        run: |
          nix develop --command bash -ceu '
            bun install --frozen-lockfile --ignore-scripts
            mkdir -p dist/cli
            bun build runtime/typescript/src/main.ts --target bun --format esm --outfile dist/cli/main.js
            bun build sdk/typescript/src/index.ts --target bun --format esm --outfile dist/cli/sdk.js
            for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
              os="${target%/*}"
              arch="${target#*/}"
              out_dir="dist/cli/helmr-${os}-${arch}"
              mkdir -p "$out_dir/adapter"
              CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build \
                -trimpath \
                -ldflags="-s -w -X github.com/helmrdotdev/helmr/internal/version.Version=${RELEASE_TAG}" \
                -o "$out_dir/helmr" \
                ./cmd/helmr
              cp dist/cli/main.js "$out_dir/adapter/main.js"
              cp dist/cli/sdk.js "$out_dir/adapter/sdk.js"
              tar -C "$out_dir" -czf "dist/helmr-${os}-${arch}.tar.gz" helmr adapter
            done
            cd dist
            sha256sum helmr-*.tar.gz > checksums.txt
          '

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cli-release-assets
          if-no-files-found: error
          retention-days: 7
          path: |
            dist/helmr-linux-amd64.tar.gz
            dist/helmr-linux-arm64.tar.gz
            dist/helmr-darwin-amd64.tar.gz
            dist/helmr-darwin-arm64.tar.gz
            dist/checksums.txt

  control-image:
    name: control image
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      CONTROL_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/helmr-control
    steps:
      - name: Validate release tag
        run: |
          if ! printf '%s' "$RELEASE_TAG" | grep -Eq '^v[A-Za-z0-9][A-Za-z0-9._-]{0,127}$'; then
            echo "release tag must start with v and contain only ASCII letters, numbers, dot, underscore, or hyphen" >&2
            exit 1
          fi
          if ! git check-ref-format --allow-onelevel "$RELEASE_TAG"; then
            echo "release tag must be a valid git ref name" >&2
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && '0' || '1' }}
          persist-credentials: false

      - name: Use existing release tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          if git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            git checkout --detach "refs/tags/$RELEASE_TAG"
          fi

      - uses: ./.github/actions/setup-nix

      - name: Build control image
        env:
          IMAGE_URI: ${{ env.CONTROL_IMAGE_REPOSITORY }}:${{ env.RELEASE_TAG }}
          HELMR_BUILD_VERSION: ${{ env.RELEASE_TAG }}
        run: |
          nix develop .#images --command bash -ceu './scripts/build-control-image.sh "$IMAGE_URI"'
          mkdir -p dist
          docker save "$IMAGE_URI" -o dist/control-image.tar

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: control-image
          if-no-files-found: error
          retention-days: 7
          path: dist/control-image.tar

  typescript-sdk-packages:
    name: typescript sdk packages
    if: startsWith(github.ref, 'refs/tags/sdk/typescript/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      platform_tag: ${{ steps.version.outputs.platform_tag }}
      sdk_version: ${{ steps.version.outputs.sdk_version }}
    env:
      SDK_RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Validate TypeScript SDK release tag
        id: version
        run: |
          if ! printf '%s' "$SDK_RELEASE_TAG" | grep -Eq '^sdk/typescript/v[0-9]+[.][0-9]+[.][0-9]+(-[0-9A-Za-z-]+([.][0-9A-Za-z-]+)*)?$'; then
            echo "TypeScript SDK release tag must match sdk/typescript/vX.Y.Z or sdk/typescript/vX.Y.Z-prerelease" >&2
            exit 1
          fi
          if ! git check-ref-format --allow-onelevel "$SDK_RELEASE_TAG"; then
            echo "TypeScript SDK release tag must be a valid git ref name" >&2
            exit 1
          fi
          sdk_version="${SDK_RELEASE_TAG#sdk/typescript/v}"
          printf 'sdk_version=%s\n' "$sdk_version" >> "$GITHUB_OUTPUT"
          printf 'platform_tag=v%s\n' "$sdk_version" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - uses: ./.github/actions/setup-nix

      - name: Build TypeScript SDK npm packages
        run: |
          nix develop --command bash -ceu '
            bun install --frozen-lockfile --ignore-scripts
            PACKAGE_VERSION="${{ steps.version.outputs.sdk_version }}" bun run build:npm
            bun run pack:npm dist/npm-tarballs
          '

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: typescript-sdk-npm-packages
          if-no-files-found: error
          retention-days: 7
          path: dist/npm-tarballs/*.tgz

  typescript-sdk-npm-publish:
    name: typescript sdk npm publish
    if: startsWith(github.ref, 'refs/tags/sdk/typescript/v')
    needs:
      - typescript-sdk-packages
    runs-on: ubuntu-24.04
    environment: release-production
    permissions:
      contents: read
      id-token: write # Needed for npm Trusted Publishing. security-check: allow-id-token
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: typescript-sdk-npm-packages
          path: dist/npm-tarballs

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Publish npm packages
        env:
          SDK_VERSION: ${{ needs.typescript-sdk-packages.outputs.sdk_version }}
        run: |
          npm_version="$(npm --version)"
          if [ "$(printf '%s\n' 11.5.1 "$npm_version" | sort -V | head -n 1)" != 11.5.1 ]; then
            echo "npm CLI 11.5.1 or newer is required for Trusted Publishing: $npm_version" >&2
            exit 1
          fi
          publish_package() {
            package_name="$1"
            tarball="$2"
            if npm view "${package_name}@${SDK_VERSION}" version --json --prefer-online >/dev/null 2>&1; then
              echo "${package_name}@${SDK_VERSION} is already published; skipping"
              return
            fi
            npm publish "$tarball" --access public --provenance
          }
          publish_package @helmr/proto dist/npm-tarballs/helmr-proto-*.tgz
          publish_package @helmr/sdk dist/npm-tarballs/helmr-sdk-*.tgz

  typescript-sdk-release:
    name: typescript sdk release
    if: startsWith(github.ref, 'refs/tags/sdk/typescript/v')
    needs:
      - typescript-sdk-packages
      - typescript-sdk-npm-publish
    runs-on: ubuntu-24.04
    environment: release-production
    permissions:
      contents: write # Needed to create or update GitHub Release assets.
    env:
      PLATFORM_TAG: ${{ needs.typescript-sdk-packages.outputs.platform_tag }}
      SDK_RELEASE_TAG: ${{ github.ref_name }}
      SDK_VERSION: ${{ needs.typescript-sdk-packages.outputs.sdk_version }}
    steps:
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          tag_name: ${{ env.SDK_RELEASE_TAG }}
          name: TypeScript SDK ${{ env.SDK_VERSION }}
          body: |
            TypeScript SDK release for Helmr ${{ env.PLATFORM_TAG }}.

            Packages:
            - https://www.npmjs.com/package/@helmr/proto/v/${{ env.SDK_VERSION }}
            - https://www.npmjs.com/package/@helmr/sdk/v/${{ env.SDK_VERSION }}

  publish:
    name: publish
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs:
      - cli
      - control-image
    runs-on: ubuntu-24.04
    environment: release-production
    permissions:
      contents: write # Needed to create or update GitHub Release assets.
      packages: write # Needed to push the official control image to GHCR.
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      CONTROL_IMAGE_REPOSITORY: ghcr.io/${{ github.repository_owner }}/helmr-control
      IMAGE_URI: ghcr.io/${{ github.repository_owner }}/helmr-control:${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      WORKER_AMIS_JSON: ${{ github.event_name == 'workflow_dispatch' && inputs.worker_amis_json || '{}' }}
    steps:
      - name: Validate release tag
        run: |
          if ! printf '%s' "$RELEASE_TAG" | grep -Eq '^v[A-Za-z0-9][A-Za-z0-9._-]{0,127}$'; then
            echo "release tag must start with v and contain only ASCII letters, numbers, dot, underscore, or hyphen" >&2
            exit 1
          fi
          if ! git check-ref-format --allow-onelevel "$RELEASE_TAG"; then
            echo "release tag must be a valid git ref name" >&2
            exit 1
          fi

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: cli-release-assets
          path: dist

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: control-image
          path: dist/control-image

      - name: Push control image
        id: push
        env:
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          docker load -i dist/control-image/control-image.tar
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "$GHCR_ACTOR" --password-stdin
          push_output="$(docker push "$IMAGE_URI")"
          printf '%s\n' "$push_output"
          digest="$(printf '%s\n' "$push_output" | awk '/digest:/ { print $3 }' | tail -n 1)"
          if [ -z "$digest" ]; then
            echo "failed to parse pushed image digest" >&2
            exit 1
          fi
          printf 'control_image=%s@%s\n' "${CONTROL_IMAGE_REPOSITORY}" "$digest" >> "$GITHUB_OUTPUT"

      - name: Write AWS release manifest
        env:
          CONTROL_IMAGE: ${{ steps.push.outputs.control_image }}
        run: |
          jq -e '
            type == "object"
            and all(keys[]; type == "string" and length > 0)
            and all(.[]; type == "string" and length > 0)
          ' >/dev/null <<<"$WORKER_AMIS_JSON"

          jq -n \
            --arg control_image "$CONTROL_IMAGE" \
            --argjson worker_amis "$WORKER_AMIS_JSON" \
            '{
              control_image: $control_image,
              worker_amis: $worker_amis
            }' > dist/aws-artifacts.json

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        if: github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/helmr-linux-amd64.tar.gz
            dist/helmr-linux-arm64.tar.gz
            dist/helmr-darwin-amd64.tar.gz
            dist/helmr-darwin-arm64.tar.gz
            dist/checksums.txt
            dist/aws-artifacts.json

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        if: github.event_name != 'workflow_dispatch'
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/helmr-linux-amd64.tar.gz
            dist/helmr-linux-arm64.tar.gz
            dist/helmr-darwin-amd64.tar.gz
            dist/helmr-darwin-arm64.tar.gz
            dist/checksums.txt
            dist/aws-artifacts.json
