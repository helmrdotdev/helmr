name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-flake:
    name: nix flake
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-nix
        with:
          cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}

      - run: nix flake check --show-trace

  repo-checks:
    name: repo checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-nix
        with:
          cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}

      - run: nix run .#ci-checks

  postgres:
    name: postgres
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-nix
        with:
          cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}

      - run: nix run .#ci-postgres

  buildkit:
    name: buildkit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-nix
        with:
          cache-name: ${{ vars.CACHIX_CACHE_NAME }}
          cachix-auth-token: ${{ github.event_name != 'pull_request' && secrets.CACHIX_AUTH_TOKEN || '' }}

      - run: nix run .#ci-buildkit
